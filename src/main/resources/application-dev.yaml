spring:
  datasource:
    name: ${spring.application.name}
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    url: jdbc:p6spy:mysql://localhost:3306/cms
    username: ${mysql.username:root}
    password: ${mysql.password:root}
  data:
    redis:
      host: 127.0.0.1
      lettuce:
        pool:
          enabled: true
          max-active: 20
          max-idle: 20
          max-wait: 1000
          min-idle: 0
          time-between-eviction-runs: 30000
  messages:
    use-code-as-default-message: true
    cache-duration: -1
  flyway:
    enabled: true
  cloud:
    vault:
      enabled: false
      scheme: http
      host: localhost
      port: 8200
      authentication: token
      token: root
      kv:
        enabled: true
        backend: secret
        default-context: ${spring.application.name}
      database:
        enabled: true
        backend: database
  config:
    import: optional:vault://
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
management:
  opentelemetry:
    logging:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/logs
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
thread:
  pool:
    executors:
      views:
        core-pool-size: 20
        max-pool-size: 50
        queue-capacity: 1000
        thread-name-prefix: viewThreadPool-
      words:
        core-pool-size: 20
        max-pool-size: 50
        queue-capacity: 1000
        thread-name-prefix: wordThreadPool-
jobrunr:
  dashboard:
    enabled: true
  database:
    type: sql
  background-job-server:
    worker-count: 5
logging:
  level:
    io.xxx.cms.view.PublishViewJob: debug
omni:
  gateway:
    url: http://localhost:8080
# Resilience4j 熔断配置
resilience4j:
  timelimiter:
    instances:
      search-recommend-service:
        timeout-duration: 5s
  circuitbreaker:
    instances:
      search-recommend-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
  retry:
    instances:
      search-recommend-service:
        max-attempts: 2
        wait-duration: 500ms
decorator:
  datasource:
    p6spy:
      enable-logging: false